services:
  ai-guardian-db:
    image: postgres:16-alpine
    container_name: ai-guardian-db
    environment:
      POSTGRES_USER: ai_guardian
      POSTGRES_PASSWORD: ai_guardian2026
      POSTGRES_DB: ai_guardian
    volumes:
      - ai-guardian-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eff -d ai_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-guardian-redis:
    image: redis:7-alpine
    container_name: ai-guardian-redis
    volumes:
      - ai-guardian-redis-data:/data
    restart: unless-stopped

  ai-guardian-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-guardian-api
    environment:
      DATABASE_URL: postgresql+psycopg://eff:ai_guardian2026@ai-guardian-db:5432/ai_guardian
      REDIS_URL: redis://ai-guardian-redis:6379/0
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      ai-guardian-db:
        condition: service_healthy
      ai-guardian-redis:
        condition: service_started
    restart: unless-stopped

  ai-guardian-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-guardian-web
    ports:
      - "8180:80"
    depends_on:
      - ai-guardian-api
    restart: unless-stopped

networks:
  default:
    name: ai-guardian-network

volumes:
  ai-guardian-db-data:
  ai-guardian-redis-data:
